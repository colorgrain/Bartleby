name: Release

# Trigger: push a version tag  →  git tag v0.1.0-4 && git push origin v0.1.0-4
# Or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0-4)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write   # needed to create the GitHub Release and upload assets

    strategy:
      fail-fast: false  # if one platform fails, the others keep running
      matrix:
        include:
          # Linux: ffmpeg sidecar only. mediainfo is a .deb dependency → installed by apt.
          - platform: ubuntu-22.04
            config-path: ''

          # Windows: ffmpeg + mediainfo both bundled as sidecars.
          - platform: windows-latest
            config-path: src-tauri/tauri.windows.conf.json

          # macOS (M1/M2 arm64 runner): ffmpeg + mediainfo both bundled as sidecars.
          # Add macos-13 to the list for an Intel Mac build as well.
          - platform: macos-latest
            config-path: src-tauri/tauri.macos.conf.json

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Platform-specific system dependencies ─────────────────────────────
      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            unzip

      - name: Windows — allow PowerShell scripts
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass

      # ── Sidecar binaries ──────────────────────────────────────────────────
      # Inline downloads (no shell script) so GitHub Actions' own set -e
      # guarantees an immediate visible failure if a download goes wrong.
      #
      # macOS note: tauri-action@v0 builds a universal binary by running
      # tauri build twice (--target aarch64-apple-darwin then x86_64-apple-darwin),
      # so tauri-build validates resources for BOTH triples → both named copies
      # of every sidecar must be present.

      - name: Download ffmpeg (Linux x86_64)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
            -o /tmp/ffmpeg.tar.xz
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp --wildcards "*/bin/ffmpeg" --strip-components=2
          cp /tmp/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu

      - name: Download ffmpeg + mediainfo (macOS — arm64 and x86_64)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          MI_VER=26.05

          # ── ffmpeg ────────────────────────────────────────────────────────
          # evermeet.cx ships an Intel x86_64 static binary; Rosetta 2 runs it
          # on Apple Silicon. We name it for both triples because tauri-action
          # builds for aarch64 + x86_64 in the same job (universal binary).
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ff.zip
          unzip -qo /tmp/ff.zip -d /tmp/ffmpeg-mac
          FFMPEG=$(find /tmp/ffmpeg-mac -type f -name "ffmpeg" | head -1)
          cp "$FFMPEG" src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp "$FFMPEG" src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin \
                   src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          codesign -s - src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          codesign -s - src-tauri/binaries/ffmpeg-x86_64-apple-darwin

          # ── mediainfo ─────────────────────────────────────────────────────
          brew install media-info
          MIBIN=$(which mediainfo)
          cp "$MIBIN" src-tauri/binaries/mediainfo-aarch64-apple-darwin
          cp "$MIBIN" src-tauri/binaries/mediainfo-x86_64-apple-darwin
          chmod +x src-tauri/binaries/mediainfo-aarch64-apple-darwin \
                   src-tauri/binaries/mediainfo-x86_64-apple-darwin
          codesign -f -s - src-tauri/binaries/mediainfo-aarch64-apple-darwin
          codesign -f -s - src-tauri/binaries/mediainfo-x86_64-apple-darwin

      - name: Download ffmpeg + mediainfo (Windows x86_64)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $MI_VER = "26.05"
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null

          # ffmpeg — BtbN builds (same source as Linux, reliable)
          Invoke-WebRequest "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" `
            -OutFile "$env:TEMP\ffmpeg.zip" -UseBasicParsing
          Expand-Archive "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg_ex" -Force
          $ff = Get-ChildItem "$env:TEMP\ffmpeg_ex" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $ff.FullName "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"

          # mediainfo
          Invoke-WebRequest "https://mediaarea.net/download/binary/mediainfo/$MI_VER/MediaInfo_CLI_${MI_VER}_Windows_x64.zip" `
            -OutFile "$env:TEMP\mi.zip" -UseBasicParsing
          Expand-Archive "$env:TEMP\mi.zip" -DestinationPath "$env:TEMP\mi_ex" -Force
          $mi = Get-ChildItem "$env:TEMP\mi_ex" -Recurse -Filter MediaInfo.exe | Select-Object -First 1
          Copy-Item $mi.FullName "src-tauri\binaries\mediainfo-x86_64-pc-windows-msvc.exe"

      - name: Verify sidecar binaries
        if: runner.os != 'Windows'
        run: ls -lh src-tauri/binaries/

      # ── npm ───────────────────────────────────────────────────────────────
      - name: npm install
        run: npm install

      # ── Build & publish ───────────────────────────────────────────────────
      # tauri-action builds the platform installer, creates a GitHub Release
      # (draft), and uploads the artifacts.  No signing secrets are required
      # for an unsigned/ad-hoc-signed build.
      #
      # ⚠  macOS: the .dmg will be ad-hoc signed (done by download_sidecars.sh)
      #    but NOT notarized (requires a paid Apple Developer account).
      #    Users who download it from GitHub will see a Gatekeeper warning on
      #    first launch: right-click → Open to bypass it.
      #
      # ⚠  Windows: the .msi/.exe will show a SmartScreen warning (unsigned).
      #    Users click "More info → Run anyway" to proceed.
      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:      ${{ github.event.inputs.tag || github.ref_name }}
          releaseName:  'Bartleby ${{ github.event.inputs.tag || github.ref_name }}'
          releaseDraft: true    # review the draft before publishing
          prerelease:   false
          # On macOS/Windows, load the platform config that adds mediainfo to externalBin.
          # On Linux the field is empty so no --config flag is passed.
          args: ${{ matrix.config-path != '' && format('--config {0}', matrix.config-path) || '' }}
