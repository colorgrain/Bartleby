name: Release

# Trigger: push a version tag  →  git tag v0.1.0-5 && git push origin v0.1.0-5
# Or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0-5)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write   # required to create the GitHub Release and upload assets

    strategy:
      fail-fast: false  # if one platform fails, the others keep running
      matrix:
        platform:
          - ubuntu-22.04
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Platform system dependencies ──────────────────────────────────────
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Sidecar binaries ──────────────────────────────────────────────────
      # Downloads bartleby-ffmpeg and bartleby-mediainfo from the binaries-v1
      # GitHub Release into src-tauri/binaries/.
      # On macOS both arch variants are downloaded (universal binary build).
      - name: Download sidecar binaries (Linux / macOS)
        if: runner.os != 'Windows'
        run: bash scripts/download_sidecars.sh

      - name: Download sidecar binaries (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\scripts\download_sidecars.ps1

      - name: Verify sidecar binaries
        if: runner.os != 'Windows'
        run: ls -lh src-tauri/binaries/

      # ── npm ───────────────────────────────────────────────────────────────
      - name: npm install
        run: npm install

      # ── Build & publish ───────────────────────────────────────────────────
      # tauri-action builds the platform installer, creates a GitHub Release
      # (draft) and uploads the artifacts.
      #
      # ⚠  macOS: the .dmg is not notarized (no Apple Developer account).
      #    Distributed via Homebrew cask which strips the quarantine flag.
      # ⚠  Windows: the installer is unsigned → SmartScreen warning on first run.
      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:      ${{ github.event.inputs.tag || github.ref_name }}
          releaseName:  'Bartleby ${{ github.event.inputs.tag || github.ref_name }}'
          releaseDraft: true
          prerelease:   false
